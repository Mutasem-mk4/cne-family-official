<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>لوحة التحكم | CNE Family Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
        background: #F2F4F8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .loading-card {
        background: white;
        border-radius: 20px;
        padding: 3rem 2.5rem;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        max-width: 400px;
        width: 90%;
      }
      .logo-squares {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        width: 40px;
        height: 40px;
        margin: 0 auto 1.5rem;
      }
      .logo-squares span {
        border-radius: 5px;
      }
      h1 { font-size: 1.4rem; font-weight: 700; color: #0D1117; margin-bottom: 0.5rem; }
      p { color: #8892A4; font-size: 0.9rem; line-height: 1.6; }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(53,116,200,0.2);
        border-top-color: #3574C8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 1.5rem auto 0;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="loading-card">
      <div class="logo-squares">
        <span style="background:#3574C8"></span>
        <span style="background:#DD3B3F"></span>
        <span style="background:#4CAF50"></span>
        <span style="background:#F7C948"></span>
      </div>
      <h1>لوحة تحكم الأكاديمية</h1>
      <p>اتحاد هندسة الحاسوب والشبكات · جامعة البلقاء التطبيقية</p>
      <div class="spinner"></div>
    </div>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Netlify Identity integration
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', user => {
          if (!user) {
            window.netlifyIdentity.on('login', () => {
              document.location.href = '/admin/';
            });
          }
        });
      }
    </script>
  </body>
</html>
