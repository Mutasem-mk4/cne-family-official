backend:
  name: git-gateway
  branch: main

locale: ar
site_url: https://cne-family-official.netlify.app
display_url: https://cne-family-official.netlify.app
logo_url: https://cne-family-official.netlify.app/logo.png

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: data
    label: "إدارة البيانات"
    delete: false # Prevent deleting the whole file
    editor:
      preview: false
    files:
      - name: subjects
        label: "المواد الدراسية"
        file: "public/data/subjects.json"
        description: "قائمة كامل المواد لكافة السنوات"
        fields:
          - label: "قائمة المواد"
            name: "subjects"
            widget: "list"
            summary: "{{name}} (السنة {{year}})"
            fields:
              - { label: "اسم المادة", name: "name", widget: "string" }
              - label: "التخصص"
                name: "major"
                widget: "select"
                options:
                  - { label: "هندسة حاسوب", value: "computer" }
                  - { label: "هندسة شبكات", value: "network" }
                  - { label: "مشترك", value: "common" }
              - label: "السنة الدراسية"
                name: "year"
                widget: "select"
                options:
                  - { label: "السنة الأولى", value: 1 }
                  - { label: "السنة الثانية", value: 2 }
                  - { label: "السنة الثالثة", value: 3 }
                  - { label: "السنة الرابعة", value: 4 }
                  - { label: "السنة الخامسة", value: 5 }
              - { label: "رابط Drive", name: "link", widget: "string", required: false }
              - { label: "أو ارفع ملف PDF", name: "file", widget: "file", required: false }

      - name: activities
        label: "الأنشطة والفعاليات"
        file: "public/data/activities.json"
        description: "الأنشطة التي تظهر في الصفحة الرئيسية وصفحة الأنشطة"
        fields:
          - label: "قائمة الأنشطة"
            name: "activities"
            widget: "list"
            summary: "{{title}} ({{date}})"
            fields:
              - { label: "عنوان الفعالية", name: "title", widget: "string" }
              - { label: "التاريخ", name: "date", widget: "string", hint: "مثال: مارس 2024" }
              - label: "التصنيف", name: "tag", widget: "select", options: ["أكاديمي", "تقني", "اجتماعي", "ريادة", "ترفيهي"] }
              - { label: "رمز (Emoji)", name: "emoji", widget: "string", default: "🚀" }
              - { label: "صورة", name: "image", widget: "image", required: false }
              - label: "لون الخلفية", name: "bg_gradient", widget: "select", options: [
                  { label: "أزرق", value: "linear-gradient(135deg,#DBEAFE,#BFDBFE)" },
                  { label: "أحمر", value: "linear-gradient(135deg,#FEE2E2,#FECACA)" },
                  { label: "أخضر", value: "linear-gradient(135deg,#D1FAE5,#A7F3D0)" },
                  { label: "أصفر", value: "linear-gradient(135deg,#FEF3C7,#FDE68A)" }
                ]}
              - { label: "وصف الفعالية", name: "description", widget: "text" }
