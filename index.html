<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="منصة CNE Family لطلبة هندسة الحاسوب والشبكات: مواد، خطط دراسية، روابط رسمية، أدوات أكاديمية، وأنشطة."
    />
    <title>CNE Family | منصة هندسة الحاسوب والشبكات</title>
    <link rel="icon" href="/assets/logos/cne-icon.png" type="image/png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1f5eff" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Changa:wght@500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/legacy.css?v=6.0.0" />
    <style>
      /* NUCLEAR MOBILE OVERRIDES - INLINED */
      @media (max-width: 768px) {
        /* FORCE WIDTHWISE HERO */
        .hero-premium {
          min-height: 380px !important;
          max-height: 480px !important;
          height: 420px !important;
          display: flex !important;
          flex-direction: column !important;
          justify-content: center !important;
          padding: 20px 0 !important;
          margin-bottom: 20px !important;
        }
        .hero-command-content { gap: 12px !important; padding: 15px !important; }
        .hero-premium h1 { font-size: 1.8rem !important; margin-bottom: 4px !important; }
        .hero-premium p { font-size: 0.9rem !important; max-width: 35ch !important; }
        .hero-primary-actions { flex-direction: row !important; gap: 10px !important; margin-top: 10px !important; }
        .hero-primary-actions .btn { flex: 1 !important; min-height: 44px !important; font-size: 0.85rem !important; }
        .hero-metrics { gap: 10px !important; margin-top: 15px !important; padding-top: 15px !important; }
        .metric-item strong { font-size: 1.2rem !important; }
        
        /* REFINED LEADERSHIP GRID */
        .org-group {
          gap: 32px !important; /* Space between title and grid */
        }
        .org-role-title {
          z-index: 10 !important; /* Keep title above the line */
          margin-bottom: 16px !important;
        }
        .org-members {
          display: grid !important;
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 20px 16px !important; /* More vertical gap, less horizontal */
          padding: 20px 10px 40px 10px !important;
          position: relative !important;
          background: transparent !important;
          align-items: start !important; /* Align tops before staggering */
        }
        .org-member-card { 
          width: 100% !important; 
          padding: 16px 10px !important; 
          border-radius: 20px !important; 
          background: var(--surface-3) !important;
          border: 1px solid var(--line) !important;
          box-shadow: var(--shadow-soft) !important;
          text-align: center !important;
          display: flex !important;
          flex-direction: column !important;
          align-items: center !important;
          gap: 8px !important;
          position: relative !important;
          z-index: 2 !important;
        }
        .member-avatar { 
          width: 64px !important; 
          height: 64px !important; 
          border-radius: 16px !important; 
          margin: 0 !important; 
          border: 3px solid var(--bg) !important;
        }
        .member-info { display: flex !important; flex-direction: column !important; gap: 4px !important; }
        .member-info strong { font-size: 0.95rem !important; display: block !important; margin: 0 !important; line-height: 1.2 !important; }
        .member-info span { font-size: 0.75rem !important; opacity: 0.8 !important; }
        
        /* Clean Topology Stagger */
        .org-members > :nth-child(even) { transform: translateY(32px) !important; }
        
        /* Fixed Structural Connector Line */
        .org-members::after {
          content: "" !important;
          position: absolute !important;
          top: -30px !important; /* Connect up to the title */
          bottom: 20px !important;
          left: 50% !important;
          width: 2px !important;
          background: linear-gradient(to bottom, transparent, var(--line) 10%, var(--line) 90%, transparent) !important;
          z-index: 0 !important;
          transform: translateX(-50%) !important;
        }
      }
    </style>
  </head>
  <body>
    <header id="navbar">
      <div class="nav-inner">
        <a href="/" class="nav-logo" data-link>
          <img src="/assets/logos/cne-icon.png" alt="CNE" class="logo-img" />
          <span class="logo-name hide-on-mobile">CNE Family <em>BAU</em></span>
        </a>

        <nav class="nav-links" id="nav-links">
          <a href="/" data-link class="nav-link">الرئيسية</a>
          <a href="/about" data-link class="nav-link">عن المنصة</a>
          <a href="/subjects" data-link class="nav-link">المواد</a>
          <a href="/map" data-link class="nav-link">الخريطة</a>
          <a href="/tracker" data-link class="nav-link">المتتبع</a>
        </nav>

        <div class="nav-actions">
          <button id="theme-toggle" class="btn-icon" aria-label="تبديل النمط">
            <span class="material-symbols-outlined">contrast</span>
          </button>
          <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSdD38YSdj9_m5Kiqc8h2oU6i1c22yeUtL2tqgSo-9Xagxrd0A/viewform?usp=header"
            target="_blank"
            rel="noopener"
            class="btn-join"
            >طلب الإنضمام</a
          >
          <button id="mobile-menu-btn" class="btn-icon mobile-only" aria-label="فتح القائمة">
            <span class="material-symbols-outlined">menu</span>
          </button>
        </div>
      </div>
    </header>

    <main id="page"></main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
